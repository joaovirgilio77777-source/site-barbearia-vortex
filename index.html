<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia do Centro | Vortex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #25d366; 
            --text-button: #1e293b; /* Cor escura para o texto dentro dos botões brancos */
            --text-light: #ffffff;   /* Cor branca para os títulos que ficam direto no fundo */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--text-light); /* Deixa os títulos brancos por padrão */
        }
        
        /* Fundo Borrado */
        .background-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/b4vByw3/magnus-mandrup-Qx-Rh-v028-A-unsplash.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.5);
            transform: scale(1.1);
            z-index: -1;
        }

        .container { width: 100%; max-width: 450px; text-align: center; margin: auto; }
        
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-top: 20px; }
        
        h1 { font-size: 1.8rem; font-weight: 800; margin: 15px 0 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p { font-size: 1rem; opacity: 0.9; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .links-area { display: grid; gap: 16px; width: 100%; }
        
        /* Ajuste dos botões para aparecer o texto */
        .card {
            background: #ffffff;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-button) !important; /* FORÇA a cor escura no texto */
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover { transform: scale(1.02); background: #f8fafc; }
        
        /* Cor específica para o botão do WhatsApp */
        .featured { background: var(--primary); color: white !important; border: none; }

        .footer-tag { 
            margin-top: 50px; 
            padding: 20px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            font-size: 0.75rem; 
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>

    <div class="container">
        <img src="https://via.placeholder.com/150/ffffff/000000?text=LOGO" alt="Logo" class="profile-img">
        
        <h1>Barbearia do Centro</h1>
        <p>O melhor corte da Zona Leste. Agende agora!</p>

        <div class="links-area">
            <a href="#" class="card featured">
                <span><i class="fab fa-whatsapp"></i> AGENDAR PELO WHATSAPP</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="#" class="card">
                <span><i class="fas fa-utensils"></i> PREÇOS</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="#" class="card">
                <span><i class="fab fa-instagram"></i> SIGA NO INSTAGRAM</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="#" class="card">
                <span><i class="fas fa-map-marker-alt"></i> VER LOCALIZAÇÃO</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer-tag">
            <p>© 2026 Vortex Digital</p>
            <p>Criado por <strong>Vortex</strong> • <a href="#" style="color: var(--primary); text-decoration: none;">Quero um site assim</a></p>
        </div>
    </div>

</body>
</html>
