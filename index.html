<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia do Centro | Vortex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #25d366; 
            --text-button: #1e293b; 
            --text-light: #ffffff;   
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--text-light); 
        }
        
        .background-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/b4vByw3/magnus-mandrup-Qx-Rh-v028-A-unsplash.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.5);
            transform: scale(1.1);
            z-index: -1;
        }

        .container { width: 100%; max-width: 450px; text-align: center; margin: auto; }
        
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-top: 20px; }
        
        h1 { font-size: 1.8rem; font-weight: 800; margin: 15px 0 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p { font-size: 1rem; opacity: 0.9; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .links-area { display: grid; gap: 16px; width: 100%; }
        
        .card {
            background: #ffffff;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-button) !important; 
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .card:hover { transform: scale(1.02); background: #f8fafc; }
        .featured { background: var(--primary); color: white !important; }

        .footer-tag { 
            margin-top: 50px; 
            padding: 20px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            font-size: 0.75rem; 
            color: #ddd;
        }

        /* Estilo do Modal */
        #modal-precos {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="background-image"></div>

    <div class="container">
        <img src="https://via.placeholder.com/150/ffffff/000000?text=LOGO" alt="Logo" class="profile-img">
        
        <h1>Barbearia do Centro</h1>
        <p>O melhor corte da Zona Leste. Agende agora!</p>

        <div class="links-area">
            <a href="https://wa.me/5511971865479?text=Olá!%20Vim%20pelo%20site%20e%20gostaria%20de%20agendar%20um%20horário" target="_blank" class="card featured">
                <span><i class="fab fa-whatsapp"></i> AGENDAR PELO WHATSAPP</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <div onclick="document.getElementById('modal-precos').style.display='flex'" class="card">
                <span><i class="fas fa-list-ul"></i> PREÇOS</span>
                <i class="fas fa-chevron-right"></i>
            </div>

            <a href="#" class="card">
                <span><i class="fab fa-instagram"></i> SIGA NO INSTAGRAM</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="#" class="card">
                <span><i class="fas fa-map-marker-alt"></i> VER LOCALIZAÇÃO</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer-tag">
            <p>© 2026 Vortex Digital</p>
            <p>Criado por <strong>Vortex</strong> • <a href="https://wa.me/5511971865479" style="color: var(--primary); text-decoration: none;">Quero um site assim</a></p>
        </div>
    </div>

    <div id="modal-precos">
        <div style="background:#fff; color:#1e293b; padding:25px; border-radius:24px; width:100%; max-width:350px; text-align:left;">
            <h2 style="margin-top:0; border-bottom:2px solid #f1f5f9; padding-bottom:15px;">Serviços</h2>
            <ul style="list-style:none; padding:0; margin: 20px 0; line-height: 2.5; font-weight:600;">
                <li style="display:flex; justify-content:space-between; border-bottom: 1px dashed #eee;">
                    <span>Corte</span> <span>R$ 45</span>
                </li>
                <li style="display:flex; justify-content:space-between; border-bottom: 1px dashed #eee;">
                    <span>Barba</span> <span>R$ 35</span>
                </li>
                <li style="display:flex; justify-content:space-between;">
                    <span>Combo</span> <span>R$ 70</span>
                </li>
            </ul>
            <button onclick="document.getElementById('modal-precos').style.display='none'" style="width:100%; background:#1e293b; color:#fff; border:none; padding:15px; border-radius:12px; cursor:pointer; font-weight:800;">FECHAR</button>
        </div>
    </div>

</body>
</html>
